<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>IA Hypermiler</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="style-filled">
  <div id="titlebar" class="titlebar">
    <div class="titlebar-controls-left">
      <button id="btn-pin" title="Sempre in primo piano" aria-label="Sempre in primo piano" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2a6 6 0 0 0-6 6c0 4.5 6 12 6 12s6-7.5 6-12a6 6 0 0 0-6-6zm0 8.5A2.5 2.5 0 1 1 12 5.5a2.5 2.5 0 0 1 0 5z" />
        </svg>
      </button>
      <button id="btn-refresh" title="Aggiorna ora" aria-label="Aggiorna ora">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4a8 8 0 1 0 7.74 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
        </svg>
      </button>
    </div>
    <div class="titlebar-drag"></div>
    <div class="titlebar-controls">
      <button id="btn-settings" title="Impostazioni" aria-label="Impostazioni">⚙</button>
      <button id="btn-minimize" title="Riduci a icona" aria-label="Riduci a icona">–</button>
      <button id="btn-close" title="Nascondi" aria-label="Nascondi">×</button>
    </div>
  </div>

  <main id="app">
    <nav id="account-tabs" class="account-tabs" hidden></nav>

    <section class="current-indicator">
      <div class="current-value" id="current-value">--%</div>
      <div class="current-label" id="current-label">In attesa di dati…</div>
    </section>

    <section class="chart-section">
      <div class="chart-header">
        <span id="chart-title">Andamento settimanale</span>
      </div>
      <div id="chart" class="chart"></div>
    </section>

    <section class="metrics-grid" id="metrics-grid">
      <div class="metric">
        <span class="metric-label">Indice efficienza</span>
        <span class="metric-value" id="metric-efficiency">--</span>
      </div>
      <div class="metric">
        <span class="metric-label">Previsionale</span>
        <span class="metric-value" id="metric-projected">--%</span>
      </div>
      <div class="metric">
        <span class="metric-label">Giorni a scadenza</span>
        <span class="metric-value" id="metric-days-left">--</span>
      </div>
      <div class="metric">
        <span class="metric-label">Autonomia stimata</span>
        <span class="metric-value" id="metric-autonomy">--</span>
      </div>
      <div class="metric">
        <span class="metric-label">Picco / media</span>
        <span class="metric-value" id="metric-peak-avg">--</span>
      </div>
      <div class="metric">
        <span class="metric-label">Streak sotto budget</span>
        <span class="metric-value" id="metric-streak">--</span>
      </div>
    </section>

    <section class="tips-section">
      <div class="tips-label">Consiglio del giorno</div>
      <div class="tips-text" id="tips-text">—</div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
