name: Build multipiattaforma

# Parte solo sui tag di versione (es. v0.1.0) o manualmente da Actions.
# Non pubblica release: i pacchetti restano scaricabili come artifact della run
# (vedi CLAUDE.md, sezione "Build e test").
"on":
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            flag: --mac
            artifact: macos-dmg
          - os: windows-latest
            flag: --win
            artifact: windows-nsis
          - os: ubuntu-latest
            flag: --linux
            artifact: linux-appimage-deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Build + test
        run: npm test

      - name: Pacchettizza (electron-builder)
        run: npx electron-builder ${{ matrix.flag }} --publish=never
        env:
          # Evita che electron-builder cerchi un'identità di firma su macOS
          # (nessun certificato disponibile per questo progetto): build non firmata.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Richiesto da electron-builder per alcune chiamate all'API GitHub
          # (download binari Electron, cache) anche senza pubblicare nulla.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Carica pacchetto come artifact
        uses: actions/upload-artifact@v4
        with:
          name: ia-hypermiler-${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: error
          retention-days: 14
